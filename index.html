<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="Lista de cursos gratuitos do SENAI na área de Tecnologia da Informação: Redes, Cloud, Segurança e Programação.">
  <meta name="author" content="Seu Nome Aqui">

  <title>SENAI — Cursos Gratuitos de TI</title>

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- HEADER -->
  <header>
    <div class="header-inner">
      <a class="logo" href="index.html" aria-label="Ir para o início">
        <span class="logo-badge">SENAI</span>
        <span class="logo-texto">Cursos Gratuitos · TI</span>
      </a>

      <button
        id="btn-tema"
        class="btn-tema"
        aria-label="Alternar tema escuro e claro"
        title="Alternar tema"
      >
        <span id="icone-tema">🌙</span>
      </button>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero" aria-label="Apresentação do site">
    <h1>Cursos Gratuitos de TI</h1>
    <p>
      Cursos gratuitos do SENAI nas áreas de Redes, Cloud,
      Segurança da Informação e Programação.
    </p>
  </section>

  <!-- CONTROLES -->
  <section class="controles" aria-label="Busca e filtros">

    <!-- BUSCA -->
    <div class="busca-wrapper">
      <span class="icone-busca" aria-hidden="true">🔍</span>
      <input
        type="search"
        id="campo-busca"
        placeholder="Buscar por nome, área, status ou modalidade..."
        aria-label="Buscar cursos"
        autocomplete="false"
      >
    </div>

    <!-- NOVOS FILTROS -->
    <div class="filtros-container">

      <!-- ÁREA -->
      <div class="grupo-filtro">
        <span class="titulo-filtro">Área</span>
        <div
          id="filtro-area"
          class="filtros"
          role="group"
          aria-label="Filtrar por área"
        ></div>
      </div>

      <!-- STATUS -->
      <div class="grupo-filtro">
        <span class="titulo-filtro">Status</span>
        <div
          id="filtro-status"
          class="filtros"
          role="group"
          aria-label="Filtrar por status"
        ></div>
      </div>

      <!-- MODALIDADE -->
      <div class="grupo-filtro">
        <span class="titulo-filtro">Modalidade</span>
        <div
          id="filtro-modalidade"
          class="filtros"
          role="group"
          aria-label="Filtrar por modalidade"
        ></div>
      </div>

    </div>

  </section>

  <!-- CONTADOR -->
  <div id="contador" class="contador" aria-live="polite"></div>

  <!-- LISTA DE CURSOS -->
  <main id="lista-cursos" aria-label="Lista de cursos"></main>

  <!-- FOOTER -->
  <footer>
    <p>
      Projeto de portfólio · Dados baseados em cursos do
      <a href="https://www.sp.senai.br" target="_blank" rel="noopener noreferrer">SENAI SP</a>
      · Atualizado em 2026
    </p>
  </footer>

  <!-- SCRIPT -->
  <script src="js/app.js"></script>

</body>
</html>
